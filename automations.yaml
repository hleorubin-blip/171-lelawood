- id: '1772501120403'
  alias: Main Overhead Dynamic
  description: ''
  use_blueprint:
    path: Blackshome/sensor-light.yaml
    input:
      motion_trigger:
      - binary_sensor.living_room_motion_devices
      light_switch:
        entity_id:
        - light.entry_overhead
        - light.sitting_overhead
        - light.sliding_door_overhead
        - light.dining_overhead
      time_delay: 30
      include_dynamic_lighting: enable_lux_controled_brightness_inv
      dynamic_lighting_lux_sensor: sensor.presence_sensor_fp2_0fdb_light_sensor_light_level
      dynamic_lighting_max_lux: 380
      dynamic_lighting_sun_elevation_start_rising: -3
      dynamic_lighting_min_lux: 40
      dynamic_lighting_min_brightness: 20
      include_bypass:
      - bypass_enabled_turn_off
      motion_bypass_lights_off:
      - input_boolean.input_boolean_away_mode
      - input_boolean.input_boolean_good_night
      include_sun: sun_disabled
      sun_elevation: 5
      dynamic_lighting_sun_elevation_end_falling: 5
      sun_elevation_rising: 5
      after_time: 05:00:00
      include_time: time_enabled
      before_time: '17:30:00'
- id: '1772504308896'
  alias: Main Lamps
  description: ''
  use_blueprint:
    path: Blackshome/sensor-light.yaml
    input:
      motion_trigger:
      - binary_sensor.living_room_motion_devices
      light_switch:
        entity_id:
        - light.brown_lamp
        - light.silver_lamp
        - light.guzzini
        - light.parquet_lamp
        - light.square_lamp
        - light.thin_lamp
        - light.big_lamp
        - light.hue_white_lamp_15
        - light.small_lamp
        - light.uplight
        - light.desk_lamp
      time_delay: 15
      include_dynamic_lighting: disable_dynamic_lighting
      dynamic_lighting_max_lux: 50
      dynamic_lighting_min_lux: 30
      dynamic_lighting_min_brightness: 30
      include_sun: sun_disabled
      sun_elevation_rising: -4
      sun_elevation: 5
      include_bypass:
      - bypass_enabled_turn_off
      motion_bypass_lights_off:
      - input_boolean.input_boolean_away_mode
      include_light_control:
      - use_brightness
      light_brightness: 100
      include_night_glow_light_control:
      - use_brightness
      include_night_glow: night_glow_enabled
      include_night_light_control:
      - use_brightness
      - if_lights_are_on_adjust_when_crossing_over
      night_time_delay: 16.5
      include_night_lights: night_lights_enabled
      night_lights_entity_state: []
      night_lights_conditions:
      - sun_enabled
      night_lights:
        entity_id:
        - light.parquet_lamp
        - light.silver_lamp
        - light.guzzini
        - light.square_lamp
        - light.thin_lamp
        - light.brown_lamp
        - light.hue_white_lamp_15
        - light.big_lamp
        - light.small_lamp
        - light.uplight
        - light.desk_lamp
      night_light_brightness: 65
      night_glow_lights:
        entity_id:
        - light.thin_lamp
        - light.square_lamp
        - light.silver_lamp
        - light.brown_lamp
        - light.guzzini
        - light.parquet_lamp
        - light.big_lamp
        - light.small_lamp
        - light.hue_white_lamp_15
      night_glow_light_brightness: 34
      dynamic_lighting_lux_sensor: sensor.presence_sensor_fp2_0fdb_light_sensor_light_level
      include_state_control: state_control_enabled
      state_control_entity: input_boolean.input_boolean_good_night
      night_lights_sun_elevation: 2
      light_transition_on: 0
      light_transition_off: 2
      night_light_transition_on: 0
      night_light_transition_off: 20
      night_glow_light_transition_off: 8
      night_glow_light_transition_on: 0
      dim_before_off_time_delay: 60
      night_lights_sun_elevation_rising: 1
- id: '1772633218168'
  alias: Sitting Room Lamps
  description: ''
  triggers:
  - trigger: time
    at: 06:00:00
    weekday:
    - sun
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    id: morning_on
    alias: morning_on
  - trigger: state
    entity_id:
    - scene.good_night
    to:
    - 'on'
    alias: goodnight_off
    id: goodnight_off
  - trigger: state
    entity_id:
    - input_boolean.input_boolean_away_mode
    to:
    - 'on'
    alias: away_off
    id: away_off
  - trigger: state
    entity_id:
    - input_boolean.input_boolean_away_mode
    to:
    - 'off'
    alias: arrive_on
    id: arrive_on
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - morning_on
        - arrive_on
      sequence:
      - type: turn_on
        device_id: 75ebeb25323fff8d723bb7cda31b6774
        entity_id: 2f130209bc3f31d19ad65dc3f96ca62c
        domain: light
      - type: turn_on
        device_id: 0f667372067b6df6f356cc51721e0117
        entity_id: 2cf48f56e56c57bf834a7608194debf6
        domain: light
  - choose:
    - conditions:
      - condition: trigger
        id:
        - goodnight_off
        - away_off
      sequence:
      - type: turn_off
        device_id: 75ebeb25323fff8d723bb7cda31b6774
        entity_id: 2f130209bc3f31d19ad65dc3f96ca62c
        domain: light
      - type: turn_off
        device_id: 0f667372067b6df6f356cc51721e0117
        entity_id: 2cf48f56e56c57bf834a7608194debf6
        domain: light
  mode: single
