- id: '1773183118204'
  alias: Good Morning - Retrigger Daytime Lamps
  description: Forces daytime lamps to re-evaluate when good_night flips OFF
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.input_boolean_good_night
    from:
    - 'on'
    to:
    - 'off'
  conditions: []
  actions:
  - action: automation.trigger
    data:
      skip_condition: false
    target:
      entity_id: automation.main_lamps_dynamic_n
  mode: single
- id: '1773184004510'
  alias: Good Morning - 5AM
  description: Flips good_night OFF at 5 AM to end nightlight mode
  triggers:
  - trigger: time
    at: 05:00:00
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.input_boolean_good_night
  mode: single
- id: '1773184612242'
  alias: Bedroom Wake Up - Weekdays
  description: Gradual bedroom wake-up light Mon-Fri
  triggers:
  - trigger: time
    at: 04:50:00
  conditions:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.leo_bedside
      - light.kyle_bedside
      - light.pagoda
      - light.ceramic
    data:
      brightness_pct: 1
  - action: light.turn_on
    target:
      entity_id:
      - light.leo_bedside
      - light.kyle_bedside
      - light.pagoda
      - light.ceramic
    data:
      brightness_pct: 30
      transition: 600
  - delay: 00:10:00
  - action: light.turn_on
    target:
      entity_id: light.levds_dimmer_c766
    data:
      brightness_pct: 20
      transition: 30
  - delay: 01:25:00
  - action: light.turn_on
    target:
      entity_id:
      - light.leo_bedside
      - light.kyle_bedside
      - light.pagoda
      - light.ceramic
    data:
      brightness_pct: 60
      transition: 300
  - action: light.turn_on
    target:
      entity_id: light.levds_dimmer_c766
    data:
      brightness_pct: 50
      transition: 300
  - delay: 00:15:00
  - action: light.turn_on
    target:
      entity_id:
      - light.leo_bedside
      - light.kyle_bedside
      - light.pagoda
      - light.ceramic
    data:
      brightness_pct: 80
      transition: 300
  - action: light.turn_on
    target:
      entity_id: light.levds_dimmer_c766
    data:
      brightness_pct: 60
      transition: 300
  mode: single
